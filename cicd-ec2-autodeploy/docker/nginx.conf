events{}

http{
    server{
        listen 80;

        location /
        {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # default (blue). deploy script will switch to 127.0.0.1:8082 for green
            proxy_pass http://127.0.0.1:8081;
        }
    }
}
